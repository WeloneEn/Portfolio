<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление лидами | WDA Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin-ui.css">
</head>

<body data-page="admin">
    <header class="site-header">
        <div class="header-container">
            <a href="/" class="brand-link">WDA</a>
            <button class="menu-toggle" id="menuToggle" type="button">Menu</button>
            <button class="theme-toggle" id="themeToggle" type="button">☾</button>
            <nav class="admin-nav">
                <a href="dashboard.html">Дашборд</a>
                <a href="admin-leads.html" class="active">Лиды</a>
                <a href="admin-events.html">События</a>
                <a href="admin-training.html">Обучение</a>
            </nav>
        </div>
    </header>

    <main class="admin-main" id="leadsPanel">
        <section class="leads-section">
            <div class="section-header">
                <h1>Управление заявками</h1>
                <div class="leads-filters" id="leadFilters">
                    <input type="text" placeholder="Поиск лида..." id="leadSearch">
                    <select id="leadStatusFilter">
                        <option value="all">Все статусы</option>
                        <option value="active">Активные</option>
                        <option value="waitlist">Лист ожидания</option>
                        <option value="new">Новые</option>
                        <option value="in_progress">В работе</option>
                        <option value="done">Завершены</option>
                    </select>
                    <select id="leadPriorityFilter">
                        <option value="all">Все приоритеты</option>
                        <option value="high">Высокий</option>
                    </select>
                </div>
            </div>

            <div class="leads-container">
                <table class="leads-table">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Имя</th>
                            <th>Контакт</th>
                            <th>Тип</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="leadsList">
                        <!-- Лиды загружаются динамически -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>
    <script src="admin-leads.js"></script>
</body>

</html>
