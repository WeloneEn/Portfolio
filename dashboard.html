<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Welone</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--line);
        }
    </style>
</head>

<body class="admin-page">
    <div class="admin-container">
        <h1>Панель управления</h1>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Заявки</h3>
                <p id="leadsCount">0</p>
            </div>
            <div class="stat-card">
                <h3>Просмотры</h3>
                <p id="viewsCount">0</p>
            </div>
        </div>
        <nav>
            <a href="admin-leads.html" class="btn btn--primary">Список заявок</a>
            <a href="index.html" class="btn btn--outline">На сайт</a>
        </nav>
    </div>
    <script src="dashboard.js"></script>
</body>

</html>
